upstreams:
  - id: agent-skills
    label: Personal Skills
    kind: git
    repo: https://github.com/yuanhaorannnnnn/agent-skills.git
    branch: main
    integration_mode: managed_install
    install:
      cwd: "."
      command:
        - bash
        - scripts/install.sh
      runtime_dir: ~/.agents/skills
    notes: >
      agent-skills is a self-contained skills distribution repository.
      It maintains its own installer and exposes skills directly to
      ~/.agents/skills. The main repository no longer snapshots its contents;
      it is the first managed_install upstream.
    tracked_skills: []
  - id: anthropics-skills
    label: Anthropic Official
    kind: git
    repo: https://github.com/anthropics/skills.git
    branch: main
    integration_mode: managed_snapshot
    notes: >
      Track only skills that are both present in anthropics/skills and already
      adopted in this repository. This manifest defines the current upstream
      tracking scope; it does not imply automatic sync yet.
    tracked_skills:
      - name: algorithmic-art
        source_path: skills/algorithmic-art
        local_path: agent-platform/skills/algorithmic-art
        sync_policy: track_upstream
      - name: brand-guidelines
        source_path: skills/brand-guidelines
        local_path: agent-platform/skills/brand-guidelines
        sync_policy: track_upstream
      - name: canvas-design
        source_path: skills/canvas-design
        local_path: agent-platform/skills/canvas-design
        sync_policy: track_upstream
      - name: docx
        source_path: skills/docx
        local_path: agent-platform/skills/docx
        sync_policy: track_upstream
      - name: frontend-design
        source_path: skills/frontend-design
        local_path: agent-platform/skills/frontend-design
        sync_policy: track_upstream
      - name: pdf
        source_path: skills/pdf
        local_path: agent-platform/skills/pdf
        sync_policy: track_upstream
      - name: skill-creator
        source_path: skills/skill-creator
        local_path: agent-platform/skills/skill-creator
        notes: >
          This entry refers to the Anthropic upstream skill from
          anthropics/skills, not the Codex built-in `.system/skill-creator`
          currently available in the runtime environment.
        sync_policy: track_upstream
      - name: pptx
        source_path: skills/pptx
        local_path: agent-platform/skills/pptx
        sync_policy: track_upstream
      - name: theme-factory
        source_path: skills/theme-factory
        local_path: agent-platform/skills/theme-factory
        sync_policy: track_upstream
      - name: xlsx
        source_path: skills/xlsx
        local_path: agent-platform/skills/xlsx
        sync_policy: track_upstream
  - id: planning-with-files-repo
    label: Third-Party Repo
    cache_name: planning-with-files
    kind: git
    repo: https://github.com/OthmanAdi/planning-with-files.git
    branch: master
    integration_mode: managed_snapshot
    notes: >
      planning-with-files comes from a dedicated third-party repository.
      Keep its upstream snapshot current, but do not auto-promote it into local
      runtime skills because third-party skill projects usually provide
      agent-specific variants.
    tracked_skills:
      - name: planning-with-files
        source_path: skills/planning-with-files
        local_path: agent-platform/skills/planning-with-files
        sync_policy: track_snapshot
  - id: superpowers-lite
    label: Superpowers Lite
    cache_name: superpowers
    kind: git
    repo: https://github.com/obra/superpowers.git
    branch: main
    integration_mode: managed_snapshot
    runtime_link_mode: curated
    notes: >
      Selected Superpowers workflows only. Do not expose the full Superpowers
      bundle, plugin hooks, or broad workflow surface because it is too noisy
      for this local agent system. Start with only the TDD workflow.
    tracked_skills:
      - name: test-driven-development
        source_path: skills/test-driven-development
        local_path: agent-platform/skills/test-driven-development
        sync_policy: track_snapshot
  - id: karpathy-skills
    label: Karpathy Guidelines
    cache_name: andrej-karpathy-skills
    kind: git
    repo: https://github.com/forrestchang/andrej-karpathy-skills.git
    branch: main
    integration_mode: managed_snapshot
    notes: >
      Behavioral coding guidelines based on Andrej Karpathy's observations
      about LLM coding pitfalls. Snapshot only the guideline skill; do not
      install plugin metadata or agent-specific rules.
    tracked_skills:
      - name: karpathy-guidelines
        source_path: skills/karpathy-guidelines
        local_path: agent-platform/skills/karpathy-guidelines
        sync_policy: track_snapshot
  - id: gstack-repo
